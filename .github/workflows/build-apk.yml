name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Fix Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/8.4/gradle-wrapper-8.4.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          curl -L "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip && \
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist && \
          cp /tmp/gradle-dist/gradle-8.4/lib/gradle-wrapper*.jar gradle/wrapper/gradle-wrapper.jar
          ls -la gradle/wrapper/
          chmod +x gradlew

      - name: Verify Wrapper
        run: |
          echo "Wrapper jar size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"
          java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain --version || true

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UPITracker-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Create Release
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: UPI Tracker v1.0.${{ github.run_number }}
          body: |
            ## 📲 How to Install
            1. Download **UPITracker-APK** below
            2. On your phone: Settings → Security → Enable Unknown Sources
            3. Install the APK → Allow SMS permissions
            4. Login with mobile number → OTP → Done! 🎉
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
