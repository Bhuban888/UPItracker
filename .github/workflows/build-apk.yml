name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Install Gradle 8.4 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH=$PATH:/opt/gradle/gradle-8.4/bin
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH
          gradle --version

      - name: Build APK with Gradle
        run: |
          gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UPITracker-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: UPI Tracker v1.0.${{ github.run_number }}
          body: |
            ## 📲 How to Install
            1. Download UPITracker-APK zip → extract the APK file
            2. Send APK to your Android phone
            3. Settings → Security → Enable Unknown Sources
            4. Tap APK → Install → Allow SMS permissions
            5. Login with mobile number → OTP → Done! 🎉
          files: app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
